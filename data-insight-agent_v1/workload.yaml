$kind: apps.supos.com;v1alpha1:Workload
$metadata:
  name: runtime

components:
  backend:
    container:
      image: data-insight-backend:0.0.1
      ports:
        - containerPort: 5000
      readinessProbe:
        tcpSocket:
          port: 5000
        initialDelaySeconds: 5
        periodSeconds: 5
        successThreshold: 1
        failureThreshold: 60
        timeoutSeconds: 3
      resources:
        limits:
          memory: "1024M"
          cpu: "1"
      env:
        APP_HOME: "/app"
      volumeMounts:
        app-data:
          mountPath: /app/data
          readOnly: false
    volumes:
      app-data:
        driver: persistent
        share: false

  frontend:
    container:
      image: data-insight-frontend:0.0.1
      ports:
        - containerPort: 80
      readinessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
        successThreshold: 1
        failureThreshold: 60
        timeoutSeconds: 3
      resources:
        limits:
          memory: "256M"
          cpu: "0.2"

routes:
  - component: backend
    port: 5000
    path:
      - "/api"
      - "/files"
      - "/health"
    options:
      responseBuffering: false

  - component: frontend
    port: 80
    path:
      - "/"

configMap:
  data:
    PROFILE: "prod"
    DEBUG: "false"
    SECRET_KEY: "replace-me"
    TEMP_DIR: "/app/data/temp"
    UPLOAD_DIR: "/app/data/uploads"
    LOG_DIR: "/app/data/logs"
    LOG_LEVEL: "INFO"
    LOG_ENABLE_FILE: "true"
    LOG_RETENTION_DAYS: "15"
    SUPOS_WEB: "http://192.168.12.65:8080"
    SUPOS_REQUEST_TIMEOUT: "15"
    USER_CONTEXT_CACHE_TTL_SECONDS: "600"
    UNS_MAX_EXPANDED_FILES: "200"
    UNS_MAX_EXPAND_DEPTH: "5"
    UNS_TREE_PAGE_SIZE: "100"
    UNS_DETAIL_WORKERS: "5"
    UNS_IMPORT_MAX_CONCURRENT: "2"
    WEB_CONCURRENCY: "2"
    GUNICORN_THREADS: "4"
    GUNICORN_TIMEOUT: "600"
    LLM_PROVIDER: "supos_llm_gateway"
    MODEL: ""
